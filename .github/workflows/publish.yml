name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*.*.*"      # triggers on v0.1.0, v1.2.3, etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests before publishing
        run: pytest tests/ -v --tb=short

      - name: Build distribution
        run: python -m build

      - name: Publish to GitHub Packages (PyPI registry)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --repository-url https://upload.pkg.github.com/Peterson-Muriuki/ \
            dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## afrikana-analytics ${{ github.ref_name }}

            Install with:
            ```bash
            pip install afrikana-analytics==${{ github.ref_name }}
            ```
